name: Parula Installers for Windows ARM

on:
  workflow_dispatch: # manually triggered
    inputs:
      release_type:
        type: choice
        options:
          - release
          - prerelease
          - test
        default: 'test'
  push:
    tags: 'v*'

jobs:
  build:
    runs-on: windows-11-arm
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Install Python distutils
      run: python -m pip install setuptools

    - name: Build installers for Windows ARM
      uses: actions/setup-node@v6
      with:
        node-version: 24.x

    - run: cd app/build; bash fix-installer-filenames.sh
    - run: cd app/build; sh parula-brand.sh
    - run: cd app; yarn install
    - run: cd lib; yarn install
    - run: cd desktop; yarn install
    - run: cd desktop/backend; yarn install
    - run: cd desktop; yarn run build:release:win
      if: github.event_name == 'push' || inputs.release_type == 'release'
      env: &build_env
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        # For Sentry source maps. Otherwise, vite build is out of memory
        NODE_OPTIONS: '--max-old-space-size=32768'
    - run: cd desktop; yarn run build:prerelease:win
      if: inputs.release_type == 'prerelease'
      env: *build_env
    - run: cd desktop; yarn run build:win
      if: inputs.release_type == 'test'
      env: *build_env
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Parula Installers Windows ARM
        path: |
          desktop/dist/*.exe
          desktop/dist/*.msi
