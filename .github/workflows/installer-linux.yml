name: Installers for Linux

on:
  workflow_dispatch: # manually triggered
    inputs:
      release_type:
        type: choice
        options:
          - release
          - prerelease
          - test
        default: 'test'
  push:
    tags: 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
    - name: Build installers for Linux
      uses: actions/setup-node@v6
      with:
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
        node-version: 24.x
    - run: sudo apt-get -y install libarchive-tools

    - run: cd app/build; sh mustang-brand.sh
    - run: cd app; yarn install
    - run: cd lib; yarn install
    - run: cd desktop; yarn install
    - run: cd desktop/backend; yarn install
    - run: |
        cd desktop
        if [[ "${{ inputs.release_type }}" == "prerelease" ]]; then
          yarn run build:prerelease:linux
        elif [[ "${{ inputs.release_type }}" == "test" ]]; then
          yarn run build:linux
        else
          yarn run build:release:linux
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        # For Sentry source maps. Otherwise, vite build is out of memory
        NODE_OPTIONS: '--max-old-space-size=32768'
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Installers Linux
        path: |
          desktop/dist/*.deb
          desktop/dist/*.rpm
          desktop/dist/*.AppImage
          desktop/dist/*.flatpak
          desktop/dist/*.snap
          desktop/dist/*.pacman
