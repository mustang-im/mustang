name: Installers for Linux ARM

on:
  workflow_dispatch: # manually triggered
    inputs:
      release_type:
        type: choice
        options:
          - release
          - prerelease
          - test
        default: 'test'
  push:
    tags: 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Install FPM
      # Work around <https://github.com/electron-userland/electron-builder/issues/9563>
      run: |
        sudo apt-get update
        sudo apt-get install ruby ruby-dev build-essential
        sudo gem install --no-document fpm

    - name: Build installers for Linux ARM
      uses: actions/setup-node@v6
      with:
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
        node-version: 24.x
    - run: sudo apt-get -y install libarchive-tools

    - run: cd app/build; bash fix-installer-filenames.sh
    - run: cd app/build; sh mustang-brand.sh
    - run: cd app; yarn install
    - run: cd lib; yarn install
    - run: cd desktop; yarn install
    - run: cd desktop/backend; yarn install
    - run: cd desktop; yarn run build:release:linux
      if: github.event_name == 'push' || inputs.release_type == 'release'
      env: &build_env
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        # For Sentry source maps. Otherwise, vite build is out of memory
        NODE_OPTIONS: '--max-old-space-size=32768'
        # Work around <https://github.com/electron-userland/electron-builder/issues/9563>
        USE_SYSTEM_FPM: true
    - run: cd desktop; yarn run build:prerelease:linux
      if: inputs.release_type == 'prerelease'
      env: *build_env
    - run: cd desktop; yarn run build:linux
      if: inputs.release_type == 'test'
      env: *build_env

    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Installers Linux ARM
        path: |
          desktop/dist/*.deb
          desktop/dist/*.rpm
          desktop/dist/*.AppImage
          desktop/dist/*.flatpak
          desktop/dist/*.snap
          desktop/dist/*.pacman
