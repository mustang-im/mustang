name: Installers for Windows

on:
  workflow_dispatch: # manually triggered
    inputs:
      release_type:
        type: choice
        options:
          - release
          - prerelease
          - test
        default: 'test'
  push:
    tags: 'v*'

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
    - name: Build installers for Windows
      uses: actions/setup-node@v6
      with:
        node-version: 24.x

    - run: cd app/build; bash fix-installer-filenames.sh
    - run: cd app/build; sh mustang-brand.sh
    - run: cd app; yarn install
    - run: cd lib; yarn install
    - run: cd desktop; yarn install
    - run: cd desktop/backend; yarn install
    - run: |
        cd desktop
        if [[ "${{ inputs.release_type }}" == "prerelease" ]]; then
          yarn run build:prerelease:win
        elif [[ "${{ inputs.release_type }}" == "test" ]]; then
          yarn run build:win
        else
          yarn run build:release:win
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        # For Sentry source maps. Otherwise, vite build is out of memory
        NODE_OPTIONS: '--max-old-space-size=32768'
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Installers Windows
        path: |
          desktop/dist/*.exe
          desktop/dist/*.msi
