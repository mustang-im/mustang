import com.android.build.gradle.internal.tasks.FinalizeBundleTask

apply plugin: 'com.android.application'

android {
    namespace "im.mustang.capa"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "im.mustang.capa"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        ndk {
            abiFilters 'arm64-v8a'
        }
    }
    signingConfigs {
        release {
            // You need to specify either an absolute path or include the
            // keystore file in the same directory as the build.gradle file.
            storeFile System.getenv("KEYSTORE_PATH") ? file(System.getenv("KEYSTORE_PATH")) : null
            storePassword System.getenv("KEYSTORE_PASS")
            keyAlias System.getenv("KEYSTORE_ALIAS")
            keyPassword System.getenv("KEYSTORE_ALIAS_PASS")
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    def appName = "mustang"
    def version = android.defaultConfig.versionName

    applicationVariants.all { variant ->
        def buildType = variant.buildType.name

        variant.outputs.all { output ->
            def ext = output.outputFile.name.endsWith('.apk') ? '.apk' : '.aab'
            if (buildType == 'release') {
                outputFileName = "${appName}-${version}${ext}"
            }
        }

        tasks.named("sign${variant.name.capitalize()}Bundle", FinalizeBundleTask) {
            if (variant.name == "release") {
                File file = finalBundleFile.asFile.get()
                File finalFile = new File(file.parentFile, "${appName}-${version}.aab")
                finalBundleFile.set(finalFile)
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// Task to collect all rebuilt .node files and place them in nodejs/build/Release
// This runs after all native modules are rebuilt by the capacitor-nodejs plugin
afterEvaluate {
    // Resolve file paths and project references during configuration time for configuration cache compatibility
    def nodejsDir = project.file('src/main/assets/public/nodejs')

    tasks.register("CollectNodeNativeModules") {
        description = "Collects all rebuilt .node files and places them in nodejs/build/Release, then deletes node_modules"
        group = "nodejs"

        doLast {
            if (!nodejsDir.exists()) {
                logger.warn("Could not find nodejs directory at ${nodejsDir.absolutePath}")
                return
            }

            // Create build/Release directory in public folder (where plugin looks)
            def publicNodejsDir = new File(nodejsDir, "public")
            def buildReleaseDir = new File(publicNodejsDir, "build/Release")
            buildReleaseDir.mkdirs()

            int copiedCount = 0
            // The .node files are in app/build/intermediates/nodejs-native-assets/nodejs-native-assets-ABI/
            // Find them directly from the build directory - use project.buildDir directly in doLast
            def buildDirValue = project.buildDir
            def nodejsNativeAssetsDir = new File(buildDirValue, "intermediates/nodejs-native-assets")

            if (nodejsNativeAssetsDir.exists()) {
                nodejsNativeAssetsDir.eachDir { abiDir ->
                    if (abiDir.name.startsWith("nodejs-native-assets-")) {
                        // Find all .node files recursively
                        abiDir.eachFileRecurse { sourceFile ->
                            if (sourceFile.name.endsWith('.node')) {
                                // Copy directly to build/Release (flatten structure)
                                def targetFile = new File(buildReleaseDir, sourceFile.name)
                                // Use Files.copy for proper file copying
                                java.nio.file.Files.copy(
                                    sourceFile.toPath(),
                                    targetFile.toPath(),
                                    java.nio.file.StandardCopyOption.REPLACE_EXISTING
                                )
                                copiedCount++
                                logger.info("Copied .node file: ${sourceFile.name} from ${abiDir.name}")
                            }
                        }
                    }
                }
            } else {
                logger.warn("NodeJS native assets directory does not exist yet: ${nodejsNativeAssetsDir.absolutePath}")
                logger.warn("This task should run after native modules are built. Make sure dependencies are correct.")
            }

            logger.info("Copied ${copiedCount} .node files to ${buildReleaseDir.absolutePath}")

            // Delete node_modules directory from public folder
            def nodeModulesDir = new File(publicNodejsDir, "node_modules")
            if (nodeModulesDir.exists()) {
                logger.info("Deleting node_modules directory at ${nodeModulesDir.absolutePath}")
                nodeModulesDir.deleteDir()
            } else {
                logger.info("node_modules directory not found, skipping deletion")
            }
        }
    }

    // Configure dependencies - depend on capacitor-nodejs tasks that build native modules
    // Note: Dependencies are set up via processDebugResources below

    // Make processDebugResources depend on CollectNodeNativeModules
    // This ensures .node files are in place before resources are processed
    tasks.named('processDebugResources').configure {
        dependsOn "CollectNodeNativeModules"
    }
}


