import com.android.build.gradle.internal.tasks.FinalizeBundleTask

apply plugin: 'com.android.application'

android {
    namespace "im.mustang.capa"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "im.mustang.capa"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // You need to specify either an absolute path or include the
            // keystore file in the same directory as the build.gradle file.
            storeFile System.getenv("KEYSTORE_PATH") ? file(System.getenv("KEYSTORE_PATH")) : null
            storePassword System.getenv("KEYSTORE_PASS")
            keyAlias System.getenv("KEYSTORE_ALIAS")
            keyPassword System.getenv("KEYSTORE_ALIAS_PASS")
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    def appName = "mustang"

    // Configure ABI splits for APKs (universal build for AAB)
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a', 'x86_64'
            universalApk true
        }
    }

    // Note: The plugin now detects splits.abi and will not set ndk.abiFilters when splits are enabled

    def appName = "Mustang"
    def version = android.defaultConfig.versionName

    applicationVariants.all { variant ->
        def buildType = variant.buildType.name

        variant.outputs.all { output ->
            // Handle APK naming with architecture
            if (output.outputFile.name.endsWith('.apk')) {
                // Get the ABI from the output file name or variant
                def abi = ""
                // For split APKs, the ABI is typically in the output file path or variant name
                if (output.outputFile.name.contains('-')) {
                    // Try to extract ABI from output file name
                    def fileName = output.outputFile.name
                    if (fileName.contains('arm64-v8a')) {
                        abi = 'arm64-v8a'
                    } else if (fileName.contains('x86_64')) {
                        abi = 'x86_64'
                    } else if (fileName.contains('armeabi-v7a')) {
                        abi = 'armeabi-v7a'
                    } else if (fileName.contains('x86')) {
                        abi = 'x86'
                    }
                }

                // If ABI not found in filename, try to get from variant filters
                if (!abi && output.getFilters() != null) {
                    output.getFilters().each { filter ->
                        if (filter.filterType.toString() == 'ABI') {
                            abi = filter.identifier
                        }
                    }
                }

                // Fallback: try to extract from variant name
                if (!abi) {
                    def variantName = variant.name.toLowerCase()
                    if (variantName.contains('arm64')) {
                        abi = 'arm64-v8a'
                    } else if (variantName.contains('x86')) {
                        abi = 'x86_64'
                    }
                }

                if (abi) {
                    outputFileName = "${appName}-${version}-${abi}.apk"
                } else {
                    // Fallback if ABI cannot be determined
                    outputFileName = "${appName}-${version}.apk"
                }
            } else {
                // Handle AAB naming (no architecture in name, universal build)
                if (buildType == 'release') {
                    outputFileName = "${appName}-${version}.aab"
                }
            }
        }

        tasks.named("sign${variant.name.capitalize()}Bundle", FinalizeBundleTask) {
            if (variant.name == "release") {
                File file = finalBundleFile.asFile.get()
                File finalFile = new File(file.parentFile, "${appName}-${version}.aab")
                finalBundleFile.set(finalFile)
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
