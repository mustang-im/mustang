import com.android.build.gradle.internal.tasks.FinalizeBundleTask

apply plugin: 'com.android.application'

android {
    namespace "im.mustang.capa"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "im.mustang.capa"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        ndk {
            abiFilters 'arm64-v8a'
        }
    }
    signingConfigs {
        release {
            // You need to specify either an absolute path or include the
            // keystore file in the same directory as the build.gradle file.
            storeFile System.getenv("KEYSTORE_PATH") ? file(System.getenv("KEYSTORE_PATH")) : null
            storePassword System.getenv("KEYSTORE_PASS")
            keyAlias System.getenv("KEYSTORE_ALIAS")
            keyPassword System.getenv("KEYSTORE_ALIAS_PASS")
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    def appName = "mustang"
    def version = android.defaultConfig.versionName

    applicationVariants.all { variant ->
        def buildType = variant.buildType.name

        variant.outputs.all { output ->
            def ext = output.outputFile.name.endsWith('.apk') ? '.apk' : '.aab'
            if (buildType == 'release') {
                outputFileName = "${appName}-${version}${ext}"
            }
        }

        tasks.named("sign${variant.name.capitalize()}Bundle", FinalizeBundleTask) {
            if (variant.name == "release") {
                File file = finalBundleFile.asFile.get()
                File finalFile = new File(file.parentFile, "${appName}-${version}.aab")
                finalBundleFile.set(finalFile)
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

// Allow custom post-build configuration
ext.postBuildExtras = {
    // Task to flatten .node files from node_modules to build/Release after native modules are rebuilt
    afterEvaluate {
        def nodejsDir = project.file('src/main/assets/public/nodejs')
        def buildReleaseDir = new File(nodejsDir, 'build/Release')

        tasks.register("FlattenNodeNativeModules") {
            description = "Moves rebuilt .node files from node_modules to flattened build/Release structure"
            group = "nodejs"

            doLast {
                if (!nodejsDir.exists()) {
                    logger.warn("Could not find nodejs directory at ${nodejsDir.absolutePath}")
                    return
                }

                // Create build/Release directory
                buildReleaseDir.mkdirs()

                def nodeModulesDir = new File(nodejsDir, 'node_modules')
                if (!nodeModulesDir.exists()) {
                    logger.warn("node_modules directory not found at ${nodeModulesDir.absolutePath}")
                    return
                }

                int movedCount = 0

                // Find all .node files in node_modules/*/build/Release/
                nodeModulesDir.eachDir { packageDir ->
                    def packageBuildRelease = new File(packageDir, 'build/Release')
                    if (packageBuildRelease.exists()) {
                        // Find the main .node file (skip test files and obj.target)
                        def mainNodeFile = null
                        packageBuildRelease.eachFileMatch(~/.*\.node$/) { nodeFile ->
                            // Skip obj.target directory files and test files
                            if (nodeFile.parentFile.name == 'obj.target' ||
                                nodeFile.name.contains('test') ||
                                nodeFile.name.contains('Test')) {
                                return
                            }

                            // Prefer the main package .node file (matches package name)
                            if (nodeFile.name == "${packageDir.name}.node" ||
                                mainNodeFile == null) {
                                mainNodeFile = nodeFile
                            }
                        }

                        if (mainNodeFile != null) {
                            // Copy the .node file with its original name
                            def targetFile = new File(buildReleaseDir, mainNodeFile.name)
                            java.nio.file.Files.copy(
                                mainNodeFile.toPath(),
                                targetFile.toPath(),
                                java.nio.file.StandardCopyOption.REPLACE_EXISTING
                            )
                            movedCount++
                            logger.info("Moved .node file: ${mainNodeFile.name} -> ${targetFile.name}")
                        }
                    }
                }

                logger.info("Moved ${movedCount} .node files to ${buildReleaseDir.absolutePath}")

                // Delete node_modules directory after moving .node files to reduce APK size
                if (nodeModulesDir.exists()) {
                    logger.info("Deleting node_modules directory at ${nodeModulesDir.absolutePath}")
                    nodeModulesDir.deleteDir()
                    logger.info("node_modules directory deleted successfully")
                } else {
                    logger.info("node_modules directory not found, skipping deletion")
                }
            }
        }

        // Make FlattenNodeNativeModules depend on buildNativeModules task from capacitor-nodejs
        // This ensures native modules are rebuilt before we move and delete node_modules
        // We need to wait for both projects to be evaluated
        project.afterEvaluate {
            def capacitorNodejsProject = project.rootProject.subprojects.find { it.name == 'capacitor-nodejs' }
            if (capacitorNodejsProject) {
                // Wait for capacitor-nodejs project to be fully evaluated
                capacitorNodejsProject.afterEvaluate {
                    // Wait a bit more to ensure tasks are registered
                    project.gradle.projectsEvaluated {
                        def buildNativeModulesTask = capacitorNodejsProject.tasks.findByName('buildNativeModules')
                        if (buildNativeModulesTask) {
                            tasks.named("FlattenNodeNativeModules").configure {
                                mustRunAfter buildNativeModulesTask
                                dependsOn buildNativeModulesTask
                            }
                        }

                        // Also depend on individual buildNativeModule_* tasks
                        capacitorNodejsProject.tasks.matching { it.name.startsWith('buildNativeModule_') }.configureEach { buildTask ->
                            tasks.named("FlattenNodeNativeModules").configure {
                                mustRunAfter buildTask
                                dependsOn buildTask
                            }
                        }
                    }
                }
            }
        }

        // Make mergeDebugAssets and mergeReleaseAssets depend on FlattenNodeNativeModules
        // This ensures .node files are flattened and node_modules deleted before assets are merged
        tasks.named('mergeDebugAssets').configure {
            dependsOn "FlattenNodeNativeModules"
        }
        tasks.named('mergeReleaseAssets').configure {
            dependsOn "FlattenNodeNativeModules"
        }

        // Also ensure processDebugResources and processReleaseResources depend on FlattenNodeNativeModules
        // This ensures .node files are flattened before resources are processed
        tasks.named('processDebugResources').configure {
            dependsOn "FlattenNodeNativeModules"
        }
        tasks.named('processReleaseResources').configure {
            dependsOn "FlattenNodeNativeModules"
        }
    }
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

