id: com.beonex.Parula
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: parula

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=dri
  - --socket=pulseaudio
  - --device=all
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-download
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:
  - name: parula
    buildsystem: simple
    build-commands:
      - ar x parula_0.9.30_arm64.deb
    sources:
      - type: file
        url: https://github.com/mustang-im/mustang/releases/download/v0.9.30/parula_0.9.30_arm64.deb
        dest-filename: parula_0.9.30_arm64.deb
        only-arches:
          - arm64
